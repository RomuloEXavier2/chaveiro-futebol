<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meu Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #1a1a2e;
    --c2: #16213e;
    --c3: #0f3460;
    --accent: #e94560;
    --accent2: #f5a623;
    --text: #f0f0f0;
    --muted: #8a8fa8;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.1);
    --radius: 16px;
    --primary: #1b4fff;
    --primary-dark: #0a1e6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--c1);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* TEAM SELECT SCREEN */
  #setup-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f3460 100%);
  }
  #setup-screen h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    letter-spacing: 3px;
    text-align: center;
    line-height: 1;
    margin-bottom: 0.5rem;
    background: linear-gradient(90deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #setup-screen p {
    color: var(--muted);
    text-align: center;
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }
  .search-box {
    width: 100%;
    max-width: 380px;
    position: relative;
    margin-bottom: 1.5rem;
  }
  .search-box input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }
  .teams-grid {
    width: 100%;
    max-width: 380px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-height: 55vh;
    overflow-y: auto;
    padding-right: 4px;
  }
  .teams-grid::-webkit-scrollbar { width: 4px; }
  .teams-grid::-webkit-scrollbar-track { background: transparent; }
  .teams-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  .team-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.85rem 0.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.18s ease;
    color: var(--text);
  }
  .team-btn:hover {
    border-color: var(--accent);
    background: rgba(233,69,96,0.12);
    transform: translateY(-2px);
  }
  .team-btn .badge {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }
  .team-btn span { font-size: 0.78rem; font-weight: 500; text-align: center; color: var(--muted); }

  /* APP SCREEN */
  #app-screen { display: none; min-height: 100vh; }

  .hero {
    position: relative;
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    opacity: 0.15;
    background-size: cover;
    background-position: center;
    filter: blur(2px);
    z-index: 0;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }
  .team-badge-big {
    width: 90px; height: 90px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
    margin: 0 auto 1rem;
    border: 3px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }
  .hero h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .hero .subtitle { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
  .change-team-btn {
    margin-top: 1rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.5);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .change-team-btn:hover { border-color: var(--accent); color: var(--accent); }

  .content { padding: 0 1.25rem 5rem; }

  /* LIVE MATCH CARD */
  .live-match {
    background: linear-gradient(135deg, #1a0a0a 0%, #2a0a15 100%);
    border: 1px solid rgba(233,69,96,0.4);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }
  .live-match::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(233,69,96,0.2);
    border: 1px solid rgba(233,69,96,0.5);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.25rem 0.65rem;
    border-radius: 20px;
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .scoreboard {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .scoreboard-team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .scoreboard-team span { font-size: 0.78rem; color: var(--muted); font-weight: 500; text-align: center; }
  .score-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 8px;
    color: #fff;
    line-height: 1;
    padding: 0 1rem;
  }
  .match-time {
    text-align: center;
    color: var(--accent2);
    font-size: 0.85rem;
    font-weight: 600;
  }
  .match-competition {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }

  /* NAV TABS */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    white-space: nowrap;
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 1.1rem;
    margin-bottom: 0.85rem;
  }
  .card-title {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.85rem;
  }

  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .result-row:last-child { border-bottom: none; }
  .result-teams { font-size: 0.88rem; font-weight: 500; flex: 1; }
  .result-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    margin: 0 0.75rem;
  }
  .result-meta { font-size: 0.72rem; color: var(--muted); text-align: right; }
  .result-outcome {
    width: 22px; height: 22px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
    flex-shrink: 0;
  }
  .outcome-w { background: rgba(39,174,96,0.25); color: #27ae60; }
  .outcome-d { background: rgba(241,196,15,0.25); color: #f1c40f; }
  .outcome-l { background: rgba(231,76,60,0.25); color: #e74c3c; }

  /* STANDINGS */
  .standings-table { width: 100%; }
  .standings-row {
    display: flex;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 8px;
  }
  .standings-row:last-child { border-bottom: none; }
  .standings-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .standings-team { flex: 1; font-size: 0.85rem; font-weight: 500; }
  .standings-stat { font-size: 0.8rem; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }
  .standings-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }
  .standings-header .standings-team { color: var(--muted); font-size: 0.72rem; }
  .standings-header .standings-pos,
  .standings-header .standings-pts,
  .standings-header .standings-stat { color: var(--muted); font-size: 0.72rem; font-family: 'DM Sans', sans-serif; }
  .my-team-row { background: rgba(233,69,96,0.08); border-radius: 8px; }
  .my-team-row .standings-team { color: var(--accent); font-weight: 600; }

  /* NEWS */
  .news-item {
    display: flex;
    gap: 0.75rem;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
  }
  .news-item:last-child { border-bottom: none; }
  .news-thumb {
    width: 64px; height: 64px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }
  .news-content { flex: 1; }
  .news-title { font-size: 0.88rem; font-weight: 500; line-height: 1.35; margin-bottom: 4px; }
  .news-meta { font-size: 0.72rem; color: var(--muted); }

  /* UPCOMING GAMES */
  .upcoming-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .upcoming-row:last-child { border-bottom: none; }
  .upcoming-teams { font-size: 0.85rem; flex: 1; }
  .upcoming-date { font-size: 0.75rem; color: var(--muted); text-align: right; }
  .upcoming-comp { font-size: 0.7rem; color: var(--accent2); }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,26,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--card-border);
    display: flex;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.75rem 0.5rem;
    cursor: pointer;
    gap: 4px;
    color: var(--muted);
    font-size: 0.68rem;
    transition: color 0.15s;
    background: none;
    border: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 1.25rem; line-height: 1; }

  .section { display: none; }
  .section.active { display: block; }

  /* COMP FILTER */
  .comp-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 1rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .comp-filter::-webkit-scrollbar { display: none; }
  .comp-btn {
    white-space: nowrap;
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .comp-btn.active { background: rgba(245,166,35,0.15); border-color: var(--accent2); color: var(--accent2); }

  .hidden { display: none !important; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }

  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 6px;
    height: 14px;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <h1>MEU TIME</h1>
  <p>Escolha o time do seu coração</p>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar time..." oninput="filterTeams(this.value)">
  </div>
  <div class="teams-grid" id="teams-grid"></div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="hero" id="hero-section">
    <div class="hero-overlay" id="hero-overlay"></div>
    <div class="hero-content">
      <div class="team-badge-big" id="hero-badge"></div>
      <h2 id="hero-name"></h2>
      <p class="subtitle" id="hero-subtitle"></p>
      <button class="change-team-btn" onclick="resetTeam()">↩ Trocar time</button>
    </div>
  </div>

  <div class="content">
    <!-- LIVE MATCH (shown if live) -->
    <div id="live-section" class="hidden">
      <div class="live-match" id="live-card">
        <div class="live-badge"><div class="live-dot"></div> AO VIVO</div>
        <div class="scoreboard" id="live-scoreboard"></div>
        <div class="match-time" id="live-time"></div>
        <div class="match-competition" id="live-comp"></div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchSection('results', this)">Últimos jogos</button>
      <button class="tab" onclick="switchSection('standings', this)">Tabela</button>
      <button class="tab" onclick="switchSection('upcoming', this)">Agenda</button>
      <button class="tab" onclick="switchSection('news', this)">Notícias</button>
    </div>

    <!-- RESULTS -->
    <div class="section active" id="results-section">
      <div class="comp-filter" id="results-filter"></div>
      <div class="card" id="results-content"></div>
    </div>

    <!-- STANDINGS -->
    <div class="section" id="standings-section">
      <div class="comp-filter" id="standings-filter"></div>
      <div class="card" id="standings-content"></div>
    </div>

    <!-- UPCOMING -->
    <div class="section" id="upcoming-section">
      <div class="card" id="upcoming-content"></div>
    </div>

    <!-- NEWS -->
    <div class="section" id="news-section">
      <div id="news-content"></div>
    </div>
  </div>
</div>

<script>
const API_KEY = '3e1110c2f4f5ad4d011110b9bb00894f'; // <-- Substitua pela sua chave do RapidAPI (API-Football)
const API_HOST = 'futebol-proxy.romuloexavier2.workers.dev'; // Endpoint oficial da API-Sports

const TEAMS = [
  // IDs verificados na API-Football (v3.football.api-sports.io)
  { id: 'flamengo',   apiId: 127,  name: 'Flamengo',      emoji: '🔴', color1: '#CC0000', color2: '#000000', city: 'Rio de Janeiro' },
  { id: 'corinthians',apiId: 131,  name: 'Corinthians',   emoji: '⚫', color1: '#1a1a1a', color2: '#888888', city: 'São Paulo' },
  { id: 'palmeiras',  apiId: 121,  name: 'Palmeiras',     emoji: '🟢', color1: '#006437', color2: '#ffffff', city: 'São Paulo' },
  { id: 'saopaulo',   apiId: 126,  name: 'São Paulo',     emoji: '🔺', color1: '#CC0000', color2: '#ffffff', city: 'São Paulo' },
  { id: 'santos',     apiId: 115,  name: 'Santos',        emoji: '⚪', color1: '#333333', color2: '#000000', city: 'Santos' },      // FIX: era 128
  { id: 'gremio',     apiId: 130,  name: 'Grêmio',        emoji: '🔵', color1: '#0066B2', color2: '#000000', city: 'Porto Alegre' },
  { id: 'inter',      apiId: 119,  name: 'Internacional', emoji: '❤️', color1: '#CC0000', color2: '#ffffff', city: 'Porto Alegre' },
  { id: 'atleticomg', apiId: 1062, name: 'Atlético-MG',   emoji: '⚫', color1: '#000000', color2: '#999999', city: 'Belo Horizonte' }, // FIX: era 106
  { id: 'cruzeiro',   apiId: 140,  name: 'Cruzeiro',      emoji: '🔵', color1: '#003399', color2: '#ffffff', city: 'Belo Horizonte' }, // FIX: era 135
  { id: 'bahia',      apiId: 118,  name: 'Bahia',         emoji: '🔵', color1: '#003399', color2: '#CC0000', city: 'Salvador' },
  { id: 'fortaleza',  apiId: 136,  name: 'Fortaleza',     emoji: '🦁', color1: '#CC0000', color2: '#003399', city: 'Fortaleza' },
  { id: 'botafogo',   apiId: 120,  name: 'Botafogo',      emoji: '⭐', color1: '#111111', color2: '#aaaaaa', city: 'Rio de Janeiro' },
  { id: 'vasco',      apiId: 133,  name: 'Vasco',         emoji: '☠️', color1: '#000000', color2: '#ffffff', city: 'Rio de Janeiro' },
  { id: 'fluminense', apiId: 124,  name: 'Fluminense',    emoji: '🌿', color1: '#6b2d5e', color2: '#CC0000', city: 'Rio de Janeiro' },
  { id: 'atleticopr', apiId: 134,  name: 'Athletico-PR',  emoji: '🔴', color1: '#CC0000', color2: '#000000', city: 'Curitiba' },
];

const COMPETITIONS = ['Brasileirão']; // Simplificado para a demonstração da API

let currentTeam = null;
let currentSection = 'results';

// Utilitário para formatar datas (ex: 2024-04-10T23:00:00+00:00 -> 10/04 20h00)
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ' ' + 
         d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

// Cache em memória: evita rebuscar dados já carregados na mesma sessão
const _cache = {};
const CACHE_TTL = 3 * 60 * 1000; // 3 minutos

async function fetchAPI(endpoint) {
  if (API_KEY === 'COLE_SUA_CHAVE_AQUI') {
    console.warn("Chave de API não configurada!");
    return null;
  }

  // Retorna do cache se ainda válido
  const hit = _cache[endpoint];
  if (hit && Date.now() - hit.ts < CACHE_TTL) return hit.data;

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000); // 8s timeout
    const response = await fetch(`https://${API_HOST}${endpoint}`, {
      method: 'GET',
      headers: { 'x-apisports-key': API_KEY },
      signal: controller.signal
    });
    clearTimeout(timeout);
    const data = await response.json();
    _cache[endpoint] = { data, ts: Date.now() };
    return data;
  } catch (error) {
    if (error.name === 'AbortError') console.error("Timeout na API:", endpoint);
    else console.error("Erro ao buscar dados da API:", error);
    return null;
  }
}

function filterTeams(q) {
  renderTeamGrid(q.toLowerCase());
}

function renderTeamGrid(filter = '') {
  const grid = document.getElementById('teams-grid');
  const filtered = TEAMS.filter(t => t.name.toLowerCase().includes(filter));
  grid.innerHTML = filtered.map(t => `
    <button class="team-btn" onclick="selectTeam('${t.id}')">
      <div class="badge" style="background: ${t.color1}20; border: 2px solid ${t.color1}40;">${t.emoji}</div>
      <span>${t.name}</span>
    </button>
  `).join('');
}

function selectTeam(id) {
  currentTeam = TEAMS.find(t => t.id === id);
  localStorage.setItem('meutime_team', id);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  initApp();
}

function resetTeam() {
  localStorage.removeItem('meutime_team');
  currentTeam = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

function initApp() {
  const t = currentTeam;
  document.getElementById('hero-badge').textContent = t.emoji;
  document.getElementById('hero-badge').style.background = t.color1 + '33';
  document.getElementById('hero-name').textContent = t.name.toUpperCase();
  document.getElementById('hero-subtitle').textContent = t.city + ' • Carregando dados...';
  document.getElementById('hero-overlay').style.background =
    `linear-gradient(to bottom, ${t.color1}55 0%, ${t.color1}11 60%, var(--c1) 100%)`;

  if (API_KEY === 'COLE_SUA_CHAVE_AQUI') {
    alert('ATENÇÃO: Você precisa colocar sua Chave da API no código para ver os dados reais!');
  }

  // Dispara todas as chamadas em paralelo — muito mais rápido que sequencial
  Promise.all([
    loadLiveMatch(),
    loadResults(),
    loadStandings(),
    loadUpcoming(),
  ]);
  loadNews(); // mockado, síncrono
}

function switchSection(s, btn) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(s + '-section').classList.add('active');
  if (btn) btn.classList.add('active');
  currentSection = s;
}

// --- INTEGRAÇÃO COM A API ---

async function loadLiveMatch() {
  const liveSection = document.getElementById('live-section');
  liveSection.classList.add('hidden'); // Esconde por padrão
  
  const data = await fetchAPI(`/fixtures?live=all&team=${currentTeam.apiId}`);
  if (!data || !data.response || data.response.length === 0) return;

  const match = data.response[0];
  liveSection.classList.remove('hidden');
  
  const isHome = match.teams.home.id === currentTeam.apiId;
  const opp = isHome ? match.teams.away : match.teams.home;
  
  document.getElementById('live-scoreboard').innerHTML = `
    <div class="scoreboard-team">
      <img src="${match.teams.home.logo}" alt="Logo" style="width:40px; height:40px;">
      <span>${match.teams.home.name}</span>
    </div>
    <div class="score-display">${match.goals.home} · ${match.goals.away}</div>
    <div class="scoreboard-team">
      <img src="${match.teams.away.logo}" alt="Logo" style="width:40px; height:40px;">
      <span>${match.teams.away.name}</span>
    </div>
  `;
  document.getElementById('live-time').textContent = `${match.fixture.status.elapsed}'`;
  document.getElementById('live-comp').textContent = match.league.name;
}

async function loadResults() {
  const el = document.getElementById('results-content');
  el.innerHTML = '<div class="loading"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';
  
  const data = await fetchAPI(`/fixtures?team=${currentTeam.apiId}&last=10`);
  if (!data || !data.response) { el.innerHTML = '<div class="loading">Erro ao carregar dados. Verifique sua API KEY.</div>'; return; }

  el.innerHTML = `<div class="card-title">Últimos resultados</div>` +
    data.response.map(r => {
      const isHome = r.teams.home.id === currentTeam.apiId;
      const myGoals = isHome ? r.goals.home : r.goals.away;
      const oppGoals = isHome ? r.goals.away : r.goals.home;
      const oppName = isHome ? r.teams.away.name : r.teams.home.name;
      
      let outcome = 'E', cls = 'outcome-d';
      if (myGoals > oppGoals) { outcome = 'V'; cls = 'outcome-w'; }
      else if (myGoals < oppGoals) { outcome = 'D'; cls = 'outcome-l'; }

      return `
      <div class="result-row">
        <div class="result-teams" style="font-size:0.82rem;">
          ${isHome ? `<strong>${currentTeam.name}</strong> × ${oppName}` : `${oppName} × <strong>${currentTeam.name}</strong>`}
        </div>
        <div class="result-score" style="color:${outcome==='V'?'#27ae60':outcome==='E'?'#f1c40f':'#e74c3c'}">${r.goals.home}–${r.goals.away}</div>
        <div class="result-outcome ${cls}">${outcome}</div>
      </div>
    `}).join('');
}

async function loadStandings() {
  const el = document.getElementById('standings-content');
  el.innerHTML = '<div class="loading"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';
  
  // Liga 71 é a Série A. Ajuste o ano conforme a temporada desejada (ex: 2024)
  const currentYear = new Date().getFullYear();
  const now = new Date();
  const seasonYear = now.getMonth() < 2 ? now.getFullYear() - 1 : now.getFullYear();
  const data = await fetchAPI(`/standings?league=71&season=${seasonYear}`);
  
  if (!data || !data.response || data.response.length === 0) { el.innerHTML = '<div class="loading">Tabela indisponível no momento.</div>'; return; }

  const standings = data.response[0].league.standings[0];
  const posColors = ['#f1c40f','#b0b0b0','#cd7f32'];
  
  el.innerHTML = `
    <div class="card-title">Classificação — ${data.response[0].league.name}</div>
    <div class="standings-row standings-header">
      <div class="standings-pos">#</div>
      <div class="standings-team">Time</div>
      <div class="standings-stat">J</div>
      <div class="standings-stat">V</div>
      <div class="standings-stat">E</div>
      <div class="standings-pts">Pts</div>
    </div>` +
    standings.map(r => `
      <div class="standings-row ${r.team.id === currentTeam.apiId ? 'my-team-row' : ''}">
        <div class="standings-pos" style="color:${posColors[r.rank-1]||'var(--muted)'}">${r.rank}</div>
        <div class="standings-team"><img src="${r.team.logo}" style="width:16px; height:16px; vertical-align:middle; margin-right:4px;"> ${r.team.name}</div>
        <div class="standings-stat">${r.all.played}</div>
        <div class="standings-stat">${r.all.win}</div>
        <div class="standings-stat">${r.all.draw}</div>
        <div class="standings-pts">${r.points}</div>
      </div>
    `).join('');
    
    document.getElementById('hero-subtitle').textContent = `Brasileirão Série A • ${standings.find(s => s.team.id === currentTeam.apiId)?.rank || '-'}º Lugar`;
}

async function loadUpcoming() {
  const el = document.getElementById('upcoming-content');
  el.innerHTML = '<div class="loading"><div class="skeleton"></div><div class="skeleton"></div></div>';
  
  const data = await fetchAPI(`/fixtures?team=${currentTeam.apiId}&next=10`);
  if (!data || !data.response) { el.innerHTML = '<div class="loading">Erro ao carregar agenda.</div>'; return; }

  el.innerHTML = `<div class="card-title">Próximos jogos</div>` +
    data.response.map(g => {
      const isHome = g.teams.home.id === currentTeam.apiId;
      const oppName = isHome ? g.teams.away.name : g.teams.home.name;
      return `
      <div class="upcoming-row">
        <div class="upcoming-teams">
          ${isHome ? `<strong>${currentTeam.name}</strong> × ${oppName}` : `${oppName} × <strong>${currentTeam.name}</strong>`}
          <div style="font-size:0.72rem;color:var(--muted);margin-top:2px;">${isHome ? '🏠 Casa' : '✈️ Fora'}</div>
        </div>
        <div style="text-align:right">
          <div class="upcoming-comp" style="display:flex;align-items:center;justify-content:flex-end;gap:4px;">
            <img src="${g.league.logo}" style="width:12px;height:12px;"> ${g.league.name}
          </div>
          <div class="upcoming-date">${formatDate(g.fixture.date)}</div>
        </div>
      </div>
    `}).join('');
}

// A API-Football não tem notícias, então mantemos um mock simulando fetch
function loadNews() {
  const headlines = [
    { icon: '📰', title: `Acompanhe as últimas atualizações sobre o ${currentTeam.name}`, time: 'Agora', source: 'Meu Time News' },
    { icon: '⚽', title: `${currentTeam.name} foca em treinamento tático para a próxima partida`, time: '2h atrás', source: 'Esporte Diário' },
    { icon: '🏆', title: `Diretoria do ${currentTeam.name} avalia cenário do campeonato`, time: '5h atrás', source: 'Central do Torcedor' },
  ];
  const el = document.getElementById('news-content');
  el.innerHTML = `<div class="card">` +
    headlines.map((n) => `
      <div class="news-item">
        <div class="news-thumb" style="background:var(--card-border);">${n.icon}</div>
        <div class="news-content">
          <div class="news-title">${n.title}</div>
          <div class="news-meta">${n.source} · ${n.time}</div>
        </div>
      </div>
    `).join('') + `</div>
    <div style="text-align:center;font-size:0.7rem;color:var(--muted);margin-top:10px;">(Notícias simuladas. APIs de notícias gratuitas no frontend possuem restrições)</div>`;
}

// Boot
window.addEventListener('DOMContentLoaded', () => {
  renderTeamGrid();
  const saved = localStorage.getItem('meutime_team');
  if (saved) {
    const t = TEAMS.find(t => t.id === saved);
    if (t) {
      currentTeam = t;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      initApp();
    }
  }
});
